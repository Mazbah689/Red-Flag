<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search Donors | Red Flag</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  </head>
  <body data-page="search">
    <header class="search-header">
      <div class="container search-top">
        <a class="brand" href="index.html">Red Flag</a>
        <div class="nav-links" id="nav-links">
          <a href="dashboard.html">Dashboard</a>
          <a href="login.html">Login</a>
          <a href="register.html">Register</a>
        </div>
      </div>
    </header>

    <main class="container search-container">
      <section class="card shadow search-card">
        <div class="search-heading">
          <h1>Search Blood Donors</h1>
          <p>Select a blood group and load available donor contacts instantly.</p>
        </div>
        <form id="searchForm" class="search-form">
          <label>
            Blood group
            <select id="searchGroup" required>
              <option value="">Choose blood group</option>
              <option value="A+">A+</option>
              <option value="A-">A-</option>
              <option value="B+">B+</option>
              <option value="B-">B-</option>
              <option value="AB+">AB+</option>
              <option value="AB-">AB-</option>
              <option value="O+">O+</option>
              <option value="O-">O-</option>
            </select>
          </label>
          <button class="btn btn-primary" type="submit">Search</button>
        </form>

        <div id="searchResult" class="result-panel">
          <div class="loading-state" id="loadingState" hidden>
            <i class="fa-solid fa-spinner fa-spin"></i> Searching donors...
          </div>
          <div id="searchMessage" class="message"></div>
          <div id="resultList" class="results-grid"></div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>Red Flag &copy; 2026</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="app.js?v=2"></script>
  </body>
</html>
